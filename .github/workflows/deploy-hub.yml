name: deploy-hub

# Deploys/updates the hub cluster ONLY: live/hub terraform apply, kubeadm
# bootstrap, then Argo CD install. Does not touch live/spoke and does not
# re-apply global/network (it only reads that state via
# terraform_remote_state — global/network must already exist; run
# deploy-network.yml first if this is a brand-new environment).
#
# Run this on its own for any hub-only change (instance type, worker
# counts, apps map, cert ARN, etc). Use deploy-all.yml only for first-time
# bring-up of a whole new environment.
#
# The actual terraform init/plan/apply steps live in the shared
# terraform-apply.yml reusable workflow.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. live/hub terraform apply ──────────────────────────────────────────
  deploy-hub:
    name: "hub infra (${{ inputs.environment }})"
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: live/hub
      environment: ${{ inputs.environment }}
      extra_tf_vars: '-var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate"'
      aws_region: ap-northeast-1
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  # ── 2. kubeadm init + CNI on the hub master ──────────────────────────────
  bootstrap-cluster-hub:
    name: "bootstrap cluster (hub, ${{ inputs.environment }})"
    needs: deploy-hub
    uses: ./.github/workflows/k8s-cluster-bootstrap.yml
    with:
      working_directory: live/hub
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  # ── 3. Argo CD install (hub only, one-time/idempotent) ──────────────────
  bootstrap-argocd:
    name: "bootstrap argo cd (${{ inputs.environment }})"
    needs: bootstrap-cluster-hub
    uses: ./.github/workflows/k8s-bootstrap-argocd.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
      env_name: hub-${{ inputs.environment }}
      argocd_chart_version: ${{ vars.ARGOCD_CHART_VERSION }}
      gitops_repo_raw_url: https://raw.githubusercontent.com/trandinhphuoc1198/k8s_ArgoCD/main
    secrets: inherit
