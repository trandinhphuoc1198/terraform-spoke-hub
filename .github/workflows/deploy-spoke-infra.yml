name: deploy-spoke-infra

# Spoke infra ONLY: terraform apply, kubeadm bootstrap, and pushing the
# argocd-manager registration token to Secrets Manager. Deliberately stops
# there — it does NOT verify the hub's Argo CD picked up the registration,
# because that verification (verify-spoke-registration.yml) requires the hub's
# master instance to exist and its Argo CD/ESO to be running, which this
# workflow has no dependency on and shouldn't wait for.
#
# This split exists so deploy-all.yml can run this in parallel with
# deploy-hub.yml (spoke's terraform state has no dependency on hub's —
# hub_vpc_cidr is a plain tfvar, not a remote-state read), then gate the
# final verify-spoke-registration.yml verification on both finishing.
#
# For a single day-2 spoke change where you just want the full chain
# (infra -> bootstrap -> register -> verify) in one run, use deploy-spoke.yml
# instead — it calls this same infra chain plus the verify step, sequentially.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      spoke_dir:
        description: "Path to the spoke root to operate on"
        required: false
        type: string
        default: "live/spoke"
      cluster_role:
        description: "Label value for cluster-role, e.g. workload"
        required: true
        type: string
        default: "workload"
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      spoke_dir:
        type: string
        default: "live/spoke"
      cluster_role:
        type: string
        default: "workload"
    outputs:
      cluster_name:
        description: "cluster_name output of the spoke's terraform root — needed by verify-spoke-registration.yml"
        value: ${{ jobs.deploy-spoke.outputs.cluster_name }}
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "ap-northeast-1"

jobs:
  # ── 1. spoke terraform apply ─────────────────────────────────────────────
  deploy-spoke:
    name: "spoke infra (${{ inputs.spoke_dir }}, ${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      cluster_name: ${{ steps.cluster_name.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ inputs.spoke_dir }}
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: terraform plan
        working-directory: ${{ inputs.spoke_dir }}
        run: |
          terraform plan \
            -var-file="envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate" \
            -out=tfplan

      - name: terraform apply
        working-directory: ${{ inputs.spoke_dir }}
        run: terraform apply -auto-approve tfplan

      - name: Capture cluster_name output
        id: cluster_name
        working-directory: ${{ inputs.spoke_dir }}
        run: echo "value=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

  # ── 2. kubeadm init + CNI on the spoke master ────────────────────────────
  bootstrap-cluster-spoke:
    name: "bootstrap cluster (spoke, ${{ inputs.environment }})"
    needs: deploy-spoke
    uses: ./.github/workflows/k8s-cluster-bootstrap.yml
    with:
      working_directory: ${{ inputs.spoke_dir }}
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  # ── 3. push argocd-manager token to Secrets Manager + rotation timer ────
  # Only touches Secrets Manager — no dependency on the hub cluster itself,
  # so this is safe to run before or during the hub's own bring-up.
  register-with-hub-spoke:
    name: "register spoke with hub (secrets manager) — ${{ inputs.environment }}"
    needs: [bootstrap-cluster-spoke, deploy-spoke]
    uses: ./.github/workflows/k8s-register-with-hub.yml
    with:
      working_directory: ${{ inputs.spoke_dir }}
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
      cluster_name: ${{ needs.deploy-spoke.outputs.cluster_name }}
      cluster_role: ${{ inputs.cluster_role }}
      env_name: spoke-${{ inputs.environment }}
    secrets: inherit