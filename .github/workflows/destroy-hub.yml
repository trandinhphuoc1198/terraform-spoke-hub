name: destroy-hub

# Tears down the hub cluster (live/hub) only. Does not touch live/spoke and
# does not touch global/network.
#
# Two phases, each its own reusable workflow, chained here for standalone
# use — destroy-all.yml calls these same two workflows directly instead,
# so it can interleave them with drain-spoke-pvcs.yml /
# terraform-destroy-spoke.yml and run both clusters' terraform destroy in
# parallel:
#   1. drain-hub-pvcs — same PVC-drain rationale as destroy-spoke.yml (the
#      hub can also run charts that provision EBS volumes dynamically via
#      the aws-ebs-csi-driver, e.g. kube-prometheus-stack/Grafana if
#      enabled on the hub, which Terraform never created).
#   2. terraform-destroy-hub — removes the Terraform-managed infra itself.
#
# ⚠️ If any spoke is still registered against this hub's Argo CD, destroying
# the hub first just means the spoke's registration goes stale (no
# automated cleanup happens on the spoke side) — that's fine to do in
# either order relative to destroy-spoke.yml, but destroy-network.yml must
# run AFTER both this and destroy-spoke.yml (see that workflow's header
# comment).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  # ── Phase 1: drain PVCs so the CSI driver releases their EBS volumes ─────
  drain-hub:
    name: "drain hub PVCs (${{ inputs.environment }})"
    uses: ./.github/workflows/drain-hub-pvcs.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  # ── Phase 2: terraform destroy ────────────────────────────────────────────
  terraform-destroy-hub:
    name: "terraform destroy hub infra (${{ inputs.environment }})"
    needs: drain-hub
    uses: ./.github/workflows/terraform-destroy-hub.yml
    with:
      environment: ${{ inputs.environment }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
