name: destroy-spoke

# Tears down ONE spoke cluster's infra (default live/spoke). Does not touch
# live/hub and does not touch global/network.
#
# Before terraform destroy runs, this workflow drains every PersistentVolumeClaim
# on the cluster over SSM. The `ebs-csi` StorageClass (platform/values/spoke/ebs-csi.yaml)
# is set to reclaimPolicy: Delete, so deleting a PVC cascades to its PV, which
# makes the aws-ebs-csi-driver issue a DeleteVolume call for the backing EBS
# volume — the same volume Terraform never created and therefore would
# otherwise orphan (postgresql, kube-prometheus-stack, Loki, Tempo ingesters
# all provision storage this way). This MUST run while the nodes/CSI driver
# are still alive, i.e. before terraform destroy — draining after the cluster
# is gone has nothing left to issue the DeleteVolume calls.
#
# If the master is unreachable over SSM (e.g. cluster already partially
# torn down, broken bootstrap), the drain step logs a warning and continues
# rather than blocking teardown — in that case check the AWS Console for
# leftover volumes tagged ebs.csi.aws.com/cluster=true after this run.
#
# NOTE: this only destroys the Terraform-managed infra. It does NOT remove
# the spoke's registration from the hub's Argo CD (that lives as a file in
# the separate gitops repo — argocd/clusters/<name>.yaml — and as a Secret
# materialized by ESO from Secrets Manager). If you're retiring this spoke
# permanently, also delete argocd/clusters/<name>.yaml from the gitops repo
# and the argocd-clusters/<cluster_name> secret in Secrets Manager, or the
# hub's Argo CD will keep showing a dead/unreachable cluster.
#
# `spoke_dir` mirrors deploy-spoke.yml so this same workflow can tear down
# any additional spoke (e.g. live/spoke-2) without new workflow jobs.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      spoke_dir:
        description: "Path to the spoke root to tear down"
        required: false
        type: string
        default: "live/spoke"
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      spoke_dir:
        type: string
        default: "live/spoke"
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "ap-northeast-1"

jobs:
  destroy-spoke:
    name: "destroy spoke infra (${{ inputs.spoke_dir }}, ${{ inputs.environment }})"
    runs-on: ubuntu-latest
    # Gate via GitHub Environment protection rules (required reviewers) —
    # configure this in repo Settings > Environments for dev/prod.
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.spoke_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: Capture master instance id
        id: instance
        run: echo "id=$(terraform output -raw master_instance_id 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      # ── Drain PVCs so the CSI driver releases their EBS volumes ──────────
      # Runs BEFORE terraform destroy — the nodes and the CSI driver pods
      # need to still be up for DeleteVolume to actually happen. Never
      # blocks teardown: any failure here is a warning, not a job failure,
      # since the whole point of this workflow is to tear the cluster down
      # regardless.
      - name: Drain PVCs (release CSI-backed EBS volumes before teardown)
        if: steps.instance.outputs.id != ''
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.id }}"

          STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text 2>/dev/null || echo "None")

          if [ "$STATUS" != "Online" ]; then
            echo "::warning::SSM agent not reachable on $INSTANCE_ID — skipping PVC drain. \
            CSI-backed EBS volumes (postgresql, kube-prometheus-stack, Loki, Tempo) may be \
            orphaned. Check the AWS Console for volumes tagged ebs.csi.aws.com/cluster=true \
            after this run and delete manually if needed."
            exit 0
          fi

          echo "Deleting all PVCs across all namespaces (reclaimPolicy: Delete on the \
          ebs-csi StorageClass will cascade PV -> EBS volume deletion)..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=["KUBECONFIG=/home/ec2-user/.kube/config kubectl delete pvc --all --all-namespaces --timeout=120s --ignore-not-found=true || true"]' \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 30); do
            ST=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$ST" in
              Success) echo "PVC delete command completed."; break ;;
              Failed|Cancelled|TimedOut)
                echo "::warning::PVC delete command ended with status $ST — some volumes \
                may not have been released cleanly. Check the AWS Console for leftover \
                volumes tagged ebs.csi.aws.com/cluster=true after this run."
                break ;;
              *) sleep 10 ;;
            esac
          done

          echo "Waiting 30s for the EBS CSI driver to finish issuing DeleteVolume calls..."
          sleep 30
        continue-on-error: true

      - name: terraform plan -destroy
        run: |
          terraform plan -destroy \
            -var-file="envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate" \
            -out=tfplan

      - name: terraform apply (destroy)
        run: terraform apply -auto-approve tfplan