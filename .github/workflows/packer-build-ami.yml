name: packer-build-ami

# Manual trigger only — this actually launches a real EC2 build instance and
# bakes/publishes an AMI, so it must never run on push/PR, only from the
# GitHub UI (Actions tab → Run workflow).
on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes minor version to bake in (must match modules/k8s's k8s_version for envs that will consume this AMI)"
        required: false
        default: "1.33"
      instance_type:
        description: "Instance type used only for the build (unrelated to master/worker instance types)"
        required: false
        default: "t3.small"

permissions:
  id-token: write   # required for AWS OIDC role assumption
  contents: read

jobs:
  build-ami:
    runs-on: ubuntu-latest
    environment: packer-build   # optional: gate with required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PACKER_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-packer@main
        with:
          version: "1.11.0"

      - name: Install Ansible
        run: pip install --break-system-packages ansible

      - name: Install Ansible collections
        working-directory: packer/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: packer init
        working-directory: packer
        run: packer init .

      - name: packer build
        working-directory: packer
        run: |
          packer build \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="vpc_id=${{ vars.PACKER_VPC_ID }}" \
            -var="subnet_id=${{ vars.PACKER_SUBNET_ID }}" \
            -var="k8s_version=${{ inputs.k8s_version }}" \
            -var="instance_type=${{ inputs.instance_type }}" \
            .
