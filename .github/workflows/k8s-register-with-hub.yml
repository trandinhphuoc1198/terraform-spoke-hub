name: k8s-register-with-hub

# Spoke only. Creates the argocd-manager SA on the spoke, pushes the
# initial registration token to Secrets Manager, and installs a host-level
# rotation timer. Must run before argocd-register-spoke.yml, which reads
# the secret this job creates. Called by deploy-spoke.yml.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the spoke root, e.g. live/spoke or live/spoke-2 — CHANGED: previously hardcoded to live/spoke"
        type: string
        default: "live/spoke"
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true
      cluster_name:
        description: "Must match live/spoke's var.cluster_name"
        type: string
        required: true
      env_name:
        description: "Full env value, e.g. spoke-dev — must match live/spoke's var.env"
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  register-with-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: Capture spoke master instance id
        id: instance
        run: echo "id=$(terraform output -raw master_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Render registration script
        run: |
          sed \
            -e "s|__CLUSTER_NAME__|${{ inputs.cluster_name }}|g" \
            -e "s|__ENV__|${{ inputs.env_name }}|g" \
            ../../.github/scripts/register-with-hub.sh.tpl > /tmp/register-with-hub.sh

      - name: Run registration via SSM
        id: register
        run: |
          B64=$(base64 -w0 /tmp/register-with-hub.sh)
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "commands=[\"echo $B64 | base64 -d > /tmp/register-with-hub.sh\", \"chmod +x /tmp/register-with-hub.sh\", \"/tmp/register-with-hub.sh\"]" \
            --query "Command.CommandId" --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ steps.instance.outputs.id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Command succeeded."; exit 0 ;;
              Failed|Cancelled|TimedOut) echo "::error::Command ended with status $STATUS"; exit 1 ;;
              *) echo "Status: $STATUS (attempt $i/90)"; sleep 10 ;;
            esac
          done
          echo "::error::Timed out waiting for command completion"
          exit 1

      - name: Show output on failure
        if: failure()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.register.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "{stdout:StandardOutputContent,stderr:StandardErrorContent}"
