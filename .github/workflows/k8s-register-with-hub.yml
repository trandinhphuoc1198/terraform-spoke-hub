name: k8s-register-with-hub

# Spoke only. Creates the argocd-manager SA on the spoke, pushes the
# initial registration token to Secrets Manager, and installs a host-level
# rotation timer. Must run before verify-spoke-registration.yml, which reads
# the secret this job creates. Called by deploy-spoke.yml.
#
# The actual send-command + poll loop lives in the shared
# .github/actions/ssm-run-script composite action.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the spoke root, e.g. live/spoke or live/spoke-2 — CHANGED: previously hardcoded to live/spoke"
        type: string
        default: "live/spoke"
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true
      cluster_name:
        description: "Must match live/spoke's var.cluster_name"
        type: string
        required: true
      cluster_role:
        description: "Value stamped into the pushed secret's 'role' field and, downstream, the ExternalSecret's cluster-role label — must match the ApplicationSets' cluster generator selector (argocd/spokes/**)"
        type: string
        default: "workload"
      env_name:
        description: "Full env value, e.g. spoke-dev — must match live/spoke's var.env"
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  register-with-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: Capture spoke master instance id
        id: instance
        run: echo "id=$(terraform output -raw master_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Render registration script
        run: |
          sed \
            -e "s|__CLUSTER_NAME__|${{ inputs.cluster_name }}|g" \
            -e "s|__CLUSTER_ROLE__|${{ inputs.cluster_role }}|g" \
            -e "s|__ENV__|${{ inputs.env_name }}|g" \
            ../../.github/scripts/register-with-hub.sh.tpl > /tmp/register-with-hub.sh

      - name: Run registration via SSM
        id: register
        uses: ./.github/actions/ssm-run-script
        with:
          instance-id: ${{ steps.instance.outputs.id }}
          script-path: /tmp/register-with-hub.sh
          timeout-seconds: "300"
          max-poll-attempts: "90"
          poll-interval-seconds: "10"

      - name: Show output on failure
        if: failure()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.register.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "{stdout:StandardOutputContent,stderr:StandardErrorContent}"
