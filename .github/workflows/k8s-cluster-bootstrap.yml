name: k8s-cluster-bootstrap

# Runs kubeadm init + CNI on a cluster's master via SSM send-command,
# instead of user_data. This is what makes a bootstrap failure show up as
# a failed CI job with logs, instead of hiding in cloud-init on a box
# nobody's watching. Called by deploy-infra.yml after the corresponding
# `terraform apply` (deploy-hub / deploy-spoke), before register-spoke.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "live/hub or live/spoke"
        type: string
        required: true
      environment:
        description: "envs/<environment> folder to read backend.hcl from"
        type: string
        required: true
      aws_region:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: Capture master instance id
        id: instance
        run: echo "id=$(terraform output -raw master_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM agent to register
        run: |
          aws ssm wait instance-information-registered \
            --instance-information-filter-list key=InstanceIds,valueSet=${{ steps.instance.outputs.id }}

      - name: Render bootstrap script from terraform output
        run: terraform output -raw master_userdata > /tmp/bootstrap.sh

      - name: Run kubeadm init + CNI via SSM
        id: bootstrap
        run: |
          B64=$(base64 -w0 /tmp/bootstrap.sh)
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 900 \
            --parameters "commands=[\"echo $B64 | base64 -d > /tmp/bootstrap.sh\", \"chmod +x /tmp/bootstrap.sh\", \"/tmp/bootstrap.sh\"]" \
            --query "Command.CommandId" --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${{ steps.instance.outputs.id }}"

      - name: Show bootstrap output on failure
        if: failure()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.bootstrap.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "{stdout:StandardOutputContent,stderr:StandardErrorContent}"

      - name: Verify master node is Ready
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["KUBECONFIG=/home/ec2-user/.kube/config kubectl get nodes --no-headers"]' \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${{ steps.instance.outputs.id }}"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ steps.instance.outputs.id }}" \
            --query StandardOutputContent --output text | tee node_status.txt
          grep -q " Ready" node_status.txt || (echo "::error::master node did not reach Ready" && exit 1)