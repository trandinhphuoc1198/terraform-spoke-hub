name: destroy-all

# FULL TEARDOWN of an environment. Destroys spoke and hub in PARALLEL,
# then network last. This is safe because:
#   - destroy-spoke.yml and destroy-hub.yml only ever mutate their own
#     state (live/spoke vs live/hub) — they don't reference or depend on
#     each other's resources at all.
#   - Both only READ global/network's state (transit_gateway_id) via
#     terraform_remote_state — a read, not a write, so two concurrent
#     reads of already-applied network state are safe.
#   - Order between hub and spoke destroy doesn't matter: if a spoke is
#     still registered in the hub's Argo CD, destroying the hub first just
#     leaves the spoke's registration stale (no automated cleanup either
#     way) — see destroy-hub.yml's header comment.
#
# network MUST run last: both live/hub and live/spoke's terraform destroy
# (and even `terraform plan -destroy`) needs to resolve global/network's
# state via terraform_remote_state — destroying network while hub/spoke
# state still references it would break that data source mid-run.
#
# For tearing down a single cluster only, use destroy-spoke.yml or
# destroy-hub.yml directly instead — this workflow destroys everything
# in the given environment, including the shared Transit Gateway that
# any other spoke (e.g. live/spoke-2) also depends on.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to destroy (backend.hcl + terraform.tfvars must exist for it in every root)"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      spoke_dir:
        description: "Path to the spoke root to tear down"
        required: false
        type: string
        default: "live/spoke"

permissions:
  id-token: write
  contents: read

jobs:
  spoke:
    name: "1a. spoke"
    uses: ./.github/workflows/destroy-spoke.yml
    with:
      environment: ${{ inputs.environment }}
      spoke_dir: ${{ inputs.spoke_dir }}
    secrets: inherit

  hub:
    name: "1b. hub (parallel with spoke)"
    uses: ./.github/workflows/destroy-hub.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  network:
    name: "2. network"
    needs: [spoke, hub]
    uses: ./.github/workflows/destroy-network.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit