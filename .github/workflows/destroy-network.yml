name: destroy-network

# Tears down the shared Transit Gateway (global/network).
#
# ⚠️ RUN THIS LAST. Both live/hub and live/spoke read this root's state via
# terraform_remote_state (transit_gateway_id). If this is destroyed while
# hub/spoke state still references it, their own `terraform destroy` (and
# even `terraform plan`) will fail trying to resolve that data source.
# Destroy live/spoke and live/hub first (destroy-spoke.yml / destroy-hub.yml,
# or destroy-all.yml which sequences all three correctly).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "ap-northeast-1"

jobs:
  destroy-network:
    name: "destroy network (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    # Gate via GitHub Environment protection rules (required reviewers) —
    # configure this in repo Settings > Environments for dev/prod.
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: global/network
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: terraform plan -destroy
        run: terraform plan -destroy -var="env_prefix=${{ inputs.environment }}" -out=tfplan

      - name: terraform apply (destroy)
        run: terraform apply -auto-approve tfplan
