name: deploy-infra

# Manual trigger ONLY. This actually creates/modifies real AWS infrastructure,
# so it must never run on push/PR — only from the GitHub UI (Actions tab ->
# Run workflow) or `gh workflow run`.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which envs/<environment> folder to deploy (backend.hcl + terraform.tfvars must exist for it in every root)"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

# Required for AWS OIDC role assumption (no long-lived AWS keys in GitHub).
permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "ap-northeast-1"
  TF_STATE_BUCKET: "terraform-state-phuoctd6"
  ARGOCD_CHART_VERSION: "10.1.1"

jobs:
  # ── 1. Shared Transit Gateway ────────────────────────────────────────────
  # Must apply first — live/hub and live/spoke both read its output via
  # terraform_remote_state.
  deploy-network:
    name: "network (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: global/network
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: terraform plan
        run: terraform plan -var="env_prefix=${{ inputs.environment }}" -out=tfplan

      - name: terraform apply
        run: terraform apply -auto-approve tfplan

  # ── 2. Hub (Argo CD cluster) ──────────────────────────────────────────────
  deploy-hub:
    name: "hub (${{ inputs.environment }})"
    needs: deploy-network
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: live/hub
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: terraform plan
        run: |
          terraform plan \
            -var-file="envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate" \
            -out=tfplan

      - name: terraform apply
        run: terraform apply -auto-approve tfplan
        
  # bootstrap-argocd:
  #   name: "bootstrap argocd (${{ inputs.environment }})"
  #   needs: deploy-hub
  #   runs-on: ubuntu-latest
  #   environment: ${{ inputs.environment }}
  #   steps:
  #     - name: Trigger gitops repo bootstrap workflow
  #       run: |
  #         curl -X POST \
  #           -H "Authorization: token ${{ secrets.GITOPS_REPO_DISPATCH_TOKEN }}" \
  #           -H "Accept: application/vnd.github.v3+json" \
  #           https://api.github.com/repos/trandinhphuoc1198/k8s_ArgoCD/actions/workflows/bootstrap-argocd.yml/dispatches \
  #           -d '{"ref":"main","inputs":{"environment":"${{ inputs.environment }}"}}'

  # ── 3. Spoke (workload cluster) ──────────────────────────────────────────
  deploy-spoke:
    name: "spoke (${{ inputs.environment }})"
    needs: deploy-network
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: live/spoke
    outputs:
      cluster_name: ${{ steps.cluster_name.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: terraform plan
        run: |
          terraform plan \
            -var-file="envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate" \
            -out=tfplan

      - name: terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Capture cluster_name output
        id: cluster_name
        run: echo "value=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

  bootstrap-cluster-hub:
    name: "bootstrap cluster (hub, ${{ inputs.environment }})"
    needs: deploy-hub
    uses: ./.github/workflows/k8s-cluster-bootstrap.yml
    with:
      working_directory: live/hub
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  bootstrap-cluster-spoke:
    name: "bootstrap cluster (spoke, ${{ inputs.environment }})"
    needs: deploy-spoke
    uses: ./.github/workflows/k8s-cluster-bootstrap.yml
    with:
      working_directory: live/spoke
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  bootstrap-argocd:
    name: "bootstrap argo cd (${{ inputs.environment }})"
    needs: bootstrap-cluster-hub
    uses: ./.github/workflows/k8s-bootstrap-argocd.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
      env_name: hub-${{ inputs.environment }}
      argocd_chart_version: ${{ vars.ARGOCD_CHART_VERSION }}
      gitops_repo_raw_url: https://raw.githubusercontent.com/trandinhphuoc1198/k8s_ArgoCD/main
    secrets: inherit

  register-with-hub-spoke:
    name: "register spoke with hub (secrets manager) — ${{ inputs.environment }}"
    needs: bootstrap-cluster-spoke
    uses: ./.github/workflows/k8s-register-with-hub.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ vars.AWS_REGION }}
      cluster_name: spoke-${{ inputs.environment }}-k8s
      env_name: spoke-${{ inputs.environment }}
    secrets: inherit
    
  register-spoke:
    name: "register spoke with hub argocd (${{ inputs.environment }})"
    needs: [deploy-spoke, deploy-hub, bootstrap-cluster-hub, bootstrap-cluster-spoke, bootstrap-argocd, register-with-hub-spoke]
    uses: ./.github/workflows/argocd-register-spoke.yml
    with:
      spoke_cluster_name: ${{ needs.deploy-spoke.outputs.cluster_name }}
      hub_env: hub-${{ inputs.environment }}
      cluster_role: workload
      cluster_env: ${{ inputs.environment }}
    secrets: inherit