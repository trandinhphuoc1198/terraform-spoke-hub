name: drain-spoke-pvcs

# Drains remaining PersistentVolumeClaims on a spoke cluster before its
# infra is torn down. Split out of destroy-spoke.yml so destroy-all.yml can
# run this in parallel with drain-hub-pvcs.yml, then run both clusters'
# terraform destroy in parallel afterward (see destroy-all.yml). Must run
# AFTER k8s-deregister-from-hub.yml — nodes/CSI driver need to still be
# alive for DeleteVolume to actually happen, and ArgoCD must no longer be
# able to resurrect anything on this spoke while draining.
#
# Best-effort: a stuck PVC logs a warning rather than failing the job,
# since the whole point of the destroy pipeline is to tear the cluster
# down regardless. The actual send-command + poll loop lives in the
# shared .github/actions/ssm-run-script composite action (called here
# with fail-on-error: "false" so we can inspect the status ourselves and
# warn instead of failing).

on:
  workflow_call:
    inputs:
      spoke_dir:
        type: string
        default: "live/spoke"
      environment:
        type: string
        required: true
      aws_region:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  drain-spoke:
    name: "drain spoke PVCs (${{ inputs.spoke_dir }}, ${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.spoke_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        run: terraform init -backend-config="envs/${{ inputs.environment }}/backend.hcl"

      - name: Capture master instance id
        id: instance
        run: echo "id=$(terraform output -raw master_instance_id 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Check SSM agent status
        id: ssm_check
        if: steps.instance.outputs.id != ''
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.id }}"
          STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text 2>/dev/null || echo "None")

          if [ "$STATUS" = "Online" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SSM agent not reachable on $INSTANCE_ID — skipping PVC drain. \
            CSI-backed EBS volumes (postgresql, kube-prometheus-stack, Loki, Tempo) may be \
            orphaned. Check the AWS Console for volumes tagged ebs.csi.aws.com/cluster=true \
            after this run and delete manually if needed."
          fi

      - name: Drain PVCs (release CSI-backed EBS volumes before teardown)
        if: steps.instance.outputs.id != '' && steps.ssm_check.outputs.online == 'true'
        id: drain
        uses: ./.github/actions/ssm-run-script
        with:
          instance-id: ${{ steps.instance.outputs.id }}
          script-path: .github/scripts/drain-pvcs.sh.tpl
          timeout-seconds: "600"
          max-poll-attempts: "55"
          poll-interval-seconds: "10"
          fail-on-error: "false"

      - name: Warn if drain did not complete cleanly
        if: steps.drain.outputs.status != '' && steps.drain.outputs.status != 'Success'
        run: |
          echo "::warning::PVC drain command ended with status ${{ steps.drain.outputs.status }} — some volumes may \
          not have been released cleanly. Check the AWS Console for leftover volumes \
          tagged ebs.csi.aws.com/cluster=true after this run."

      - name: Show PVC drain output
        if: steps.drain.outputs.cmd_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.drain.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "StandardOutputContent" --output text || true
