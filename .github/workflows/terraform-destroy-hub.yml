name: terraform-destroy-hub

# Runs `terraform destroy` for live/hub. Split out of destroy-hub.yml so
# destroy-all.yml can run this in parallel with terraform-destroy-spoke.yml
# once both clusters have finished draining PVCs (see destroy-all.yml).
# Assumes drain-hub-pvcs.yml already ran — this workflow does not enforce
# that itself, the caller does via `needs:`.
#
# The actual terraform init/plan -destroy/apply steps live in the shared
# terraform-apply.yml reusable workflow.

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy-hub:
    name: "terraform destroy hub infra (${{ inputs.environment }})"
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: live/hub
      environment: ${{ inputs.environment }}
      destroy: true
      extra_tf_vars: '-var="network_state_key=global/network/${{ inputs.environment }}/terraform.tfstate"'
      aws_region: ap-northeast-1
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
