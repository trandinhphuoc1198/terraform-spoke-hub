---
# Bakes everything that was previously the shared "common" block of
# modules/k8s's user_data into the AMI instead of running it on every boot:
# swap/kernel/sysctl prep, containerd, and kubeadm/kubelet/kubectl.
#
# Deliberately NOT baked (still handled at instance-launch time by
# modules/k8s's user_data, since it's per-instance/dynamic):
#   kubeadm init/join, CNI, AWS CCM, the join-token SSM dance.
#
# The "disable source/dest check" systemd unit below IS fully generic and
# baked here (unlike the above) even though it also runs at every boot —
# see the comment on that task block for why.

- name: Bake k8s base image
  hosts: all
  become: true

  vars:
    k8s_version: "1.33" # overridden via `--extra-vars k8s_version=...` from Packer
    crictl_version: "1.31.0"

  tasks:
    - name: Install amazon-ssm-agent
      ansible.builtin.dnf:
        name: amazon-ssm-agent
        state: present

    - name: Enable and start amazon-ssm-agent
      ansible.builtin.systemd:
        name: amazon-ssm-agent
        enabled: true
        state: started

    - name: Install base utilities
      ansible.builtin.dnf:
        name:
          - jq
          - git
        state: present

    - name: Download Helm installer script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: "0755"

    - name: Run Helm installer script
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Remove Helm installer script from tmp
      ansible.builtin.file:
        path: /tmp/get_helm.sh
        state: absent

    - name: Disable swap now
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Comment out swap entries in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '#\1'

    - name: Load overlay/br_netfilter kernel modules on every boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Load kernel modules now
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Kubernetes-required sysctl params
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: "0644"

    - name: Apply sysctl params
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Install containerd
      ansible.builtin.dnf:
        name: containerd
        state: present

    - name: Ensure /etc/containerd exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config (only if absent)
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

    - name: Download crictl release
      ansible.builtin.get_url:
        url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-linux-amd64.tar.gz"
        dest: /tmp/crictl.tar.gz
        mode: "0644"

    - name: Extract crictl binary
      ansible.builtin.unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/crictl

    - name: Make crictl executable
      ansible.builtin.file:
        path: /usr/local/bin/crictl
        mode: "0755"

    - name: Configure crictl to use containerd
      ansible.builtin.copy:
        dest: /etc/crictl.yaml
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 2
          debug: false
        mode: "0644"

    - name: Remove crictl archive from tmp
      ansible.builtin.file:
        path: /tmp/crictl.tar.gz
        state: absent

    - name: Add Kubernetes yum repo
      ansible.builtin.yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/"
        enabled: true
        gpgcheck: true
        gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"

    - name: Install kubelet, kubeadm, kubectl
      ansible.builtin.dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started

    # ── Disable source/dest check (Cilium native routing) ──────────────────
    # This one IS baked into the AMI, unlike kubeadm init/join/CCM above,
    # because it's fully generic — "ask IMDS who I am, tell AWS to stop
    # checking my source/dest" needs no per-cluster values (no join token,
    # no cluster name, nothing that only exists at Terraform-apply time).
    # Baking it means modules/k8s/templates/worker_init.sh.tpl doesn't
    # need to carry this logic at all; it runs identically on the master
    # too (redundant with — but harmless alongside — the master's
    # declarative source_dest_check=false in modules/ec2/main.tf, since
    # aws_instance supports that argument directly and
    # aws_launch_template's network_interfaces block still doesn't:
    # hashicorp/terraform-provider-aws#29561).
    #
    # Needs ec2:ModifyInstanceAttribute at runtime — see the
    # worker_self_manage IAM policy in modules/ec2/main.tf (master already
    # has this permission via master_ccm_policy's tag-scoped statement).
    - name: Install disable-source-dest-check script
      ansible.builtin.copy:
        dest: /usr/local/bin/disable-source-dest-check.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          AWS_REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id)

          echo "Disabling source/dest check on $INSTANCE_ID ($AWS_REGION)..."
          aws ec2 modify-instance-attribute \
            --instance-id "$INSTANCE_ID" \
            --source-dest-check '{"Value": false}' \
            --region "$AWS_REGION"

    - name: Install disable-source-dest-check systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/disable-source-dest-check.service
        mode: "0644"
        content: |
          [Unit]
          Description=Disable source/dest check on this instance for Cilium native routing
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/disable-source-dest-check.sh
          # Retries a handful of times in case the instance's IAM
          # credentials/network aren't fully ready yet at this point in boot.
          Restart=on-failure
          RestartSec=10s
          StartLimitBurst=5
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Enable disable-source-dest-check service
      ansible.builtin.systemd:
        name: disable-source-dest-check.service
        enabled: true
        daemon_reload: true
        # Not started here — no network/IAM role attached yet during the
        # Packer build. It runs for real on first boot of any instance
        # launched from this AMI (master and worker alike), per
        # WantedBy=multi-user.target above.