---
# Bakes everything that was previously the shared "common" block of
# modules/k8s's user_data into the AMI instead of running it on every boot:
# swap/kernel/sysctl prep, containerd, and kubeadm/kubelet/kubectl.
#
# Deliberately NOT baked (still handled at instance-launch time by
# modules/k8s's user_data, since it's per-instance/dynamic):
#   kubeadm init/join, CNI, AWS CCM, Argo CD, the join-token SSM dance.

- name: Bake k8s base image
  hosts: all
  become: true

  vars:
    k8s_version: "1.29" # overridden via `--extra-vars k8s_version=...` from Packer

  tasks:
    - name: Install base utilities
      dnf:
        name: jq
        state: present

    - name: Disable swap now
      command: swapoff -a
      changed_when: true

    - name: Comment out swap entries in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '#\1'

    - name: Load overlay/br_netfilter kernel modules on every boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Load kernel modules now
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Kubernetes-required sysctl params
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: "0644"

    - name: Apply sysctl params
      command: sysctl --system
      changed_when: true

    - name: Install containerd
      dnf:
        name: containerd
        state: present

    - name: Ensure /etc/containerd exists
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config (only if absent)
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started

    - name: Add Kubernetes yum repo
      yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/"
        enabled: true
        gpgcheck: true
        gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"

    - name: Install kubelet, kubeadm, kubectl
      dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true
        state: started
      # kubelet will crashloop harmlessly until kubeadm init/join configures
      # it at launch time — same behavior as the original `systemctl enable
      # --now kubelet` in modules/k8s's user_data.
